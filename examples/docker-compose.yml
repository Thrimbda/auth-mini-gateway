services:
  gateway:
    build:
      context: ..
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      GATEWAY_PUBLIC_BASE_URL: http://localhost:${NGINX_PORT:-8080}
      AUTH_MINI_ISSUER: http://mock-auth-mini:7777
      AUTH_MINI_PUBLIC_BASE_URL: http://localhost:${AUTH_MINI_PORT:-7777}
      GATEWAY_COOKIE_SECRET: compose-dev-secret-change-me-32chars
      COOKIE_SECURE: "false"
      ALLOW_EMAILS: allowed@example.com
      REQUIRE_PASSKEY: "true"
    depends_on:
      - mock-auth-mini

  upstream:
    build:
      context: ..
    command: ["node", "dist/examples/upstream.js"]
    environment:
      HOST: 0.0.0.0
      PORT: 4000

  mock-auth-mini:
    build:
      context: ..
    command: ["node", "dist/examples/mock-auth-mini.js"]
    environment:
      HOST: 0.0.0.0
      PORT: 7777
      ISSUER: http://mock-auth-mini:7777
    ports:
      - "${AUTH_MINI_PORT:-7777}:7777"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:8080"
    depends_on:
      - gateway
      - upstream
