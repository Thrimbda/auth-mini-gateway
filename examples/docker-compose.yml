services:
  gateway:
    build:
      context: ..
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      GATEWAY_PUBLIC_BASE_URL: http://localhost:${NGINX_PORT:-8080}
      AUTH_MINI_ISSUER: ${AUTH_MINI_ISSUER:-http://auth-mini:7777}
      AUTH_MINI_PUBLIC_BASE_URL: ${AUTH_MINI_PUBLIC_BASE_URL:-http://localhost:7777}
      GATEWAY_DB: /data/auth-mini-gateway.sqlite
      GATEWAY_COOKIE_SECRET: ${GATEWAY_COOKIE_SECRET:-compose-dev-secret-change-me-32chars}
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      ALLOW_EMAILS: ${ALLOW_EMAILS:-allowed@example.com}
      ALLOW_USER_IDS: ${ALLOW_USER_IDS:-}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      SESSION_ABSOLUTE_TTL_SECONDS: ${SESSION_ABSOLUTE_TTL_SECONDS:-2592000}
      SESSION_TOUCH_INTERVAL_SECONDS: ${SESSION_TOUCH_INTERVAL_SECONDS:-3600}
      LOGIN_STATE_TTL_SECONDS: ${LOGIN_STATE_TTL_SECONDS:-600}
    volumes:
      - gateway-data:/data
    depends_on:
      - upstream

  upstream:
    build:
      context: ..
    command: ["auth-mini-gateway-upstream"]
    environment:
      HOST: 0.0.0.0
      PORT: 4000

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:8080"
    depends_on:
      - gateway
      - upstream

volumes:
  gateway-data:
