map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream gateway {
  server gateway:3000;
}

upstream protected_upstream {
  server upstream:4000;
}

server {
  listen 8080;
  server_name _;

  location = /healthz {
    proxy_pass http://gateway/healthz;
  }

  location = /login {
    proxy_pass http://gateway/login;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /auth/callback {
    proxy_pass http://gateway/auth/callback;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /auth/callback/session {
    proxy_pass http://gateway/auth/callback/session;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /logout {
    proxy_pass http://gateway/logout;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /_auth {
    internal;
    proxy_pass http://gateway/auth/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Cookie $http_cookie;
  }

  location / {
    auth_request /_auth;
    auth_request_set $auth_user_id $upstream_http_x_auth_mini_user_id;
    auth_request_set $auth_email $upstream_http_x_auth_mini_email;
    auth_request_set $auth_set_cookie $upstream_http_set_cookie;
    add_header Set-Cookie $auth_set_cookie always;
    error_page 401 = /__login_redirect;
    error_page 403 = @forbidden;
    # auth_request converts non-401/403 subrequest failures (including gateway
    # 503 and connection errors) to 500 in the main request.
    error_page 500 = @auth_unavailable;
    proxy_intercept_errors off;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header Cookie "";
    proxy_set_header X-Auth-Mini-User-Id $auth_user_id;
    proxy_set_header X-Auth-Mini-Email $auth_email;
    proxy_pass http://protected_upstream;
  }

  location = /__login_redirect {
    internal;
    proxy_pass http://gateway/login;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-URI $request_uri;
    # Keep the auth subrequest's amg_session clear header in addition to the
    # proxied /login response's independent amg_login_state Set-Cookie.
    add_header Set-Cookie $auth_set_cookie always;
  }

  location @forbidden {
    return 403 "Forbidden\n";
  }

  location @auth_unavailable {
    add_header Cache-Control "no-store" always;
    add_header Retry-After "5" always;
    return 503 "Authentication service temporarily unavailable\n";
  }
}
