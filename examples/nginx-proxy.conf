# Acorn proxy-mode server. `map` belongs in the nginx `http` context.
map $http_upgrade $gateway_connection {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name app.example.com;

    ssl_certificate     /etc/nginx/tls/app.example.com.crt;
    ssl_certificate_key /etc/nginx/tls/app.example.com.key;

    # Deliver underscore aliases to the hardened gateway for a fixed 400.
    # Continue dropping other nginx-invalid names.
    underscores_in_headers on;
    ignore_invalid_headers on;

    client_max_body_size 0;
    client_body_timeout 24h;
    send_timeout 24h;

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;

        # One canonical value enters the trusted direct-peer boundary.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "";
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Port "";

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $gateway_connection;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 24h;
        proxy_read_timeout 24h;
        proxy_socket_keepalive on;

        proxy_intercept_errors off;
        proxy_next_upstream off;
        proxy_redirect off;
    }
}
