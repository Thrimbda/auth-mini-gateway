# Candidate Acorn server block used only while public traffic is maintenance-denied.
# Keep an operator loopback path through this block for the raw alias probe.
map $http_upgrade $gateway_connection {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name app.example.com;

    ssl_certificate     /etc/nginx/tls/app.example.com.crt;
    ssl_certificate_key /etc/nginx/tls/app.example.com.key;

    # A pre-hardening binary must never receive underscore aliases.
    underscores_in_headers off;
    ignore_invalid_headers on;

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $gateway_connection;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_next_upstream off;
    }
}
